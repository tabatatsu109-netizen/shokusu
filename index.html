<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp Meal Manager</title>
<style>
  :root {
    --green: #1a5c3a;
    --green-light: #2a7a52;
    --green-pale: #e8f5ee;
    --green-border: #b8ddc8;
    --accent: #e8622a;
    --text: #1a1a1a;
    --text-sub: #555;
    --bg: #f5f7f5;
    --white: #ffffff;
    --border: #dde3dd;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
  }

  /* ====== HEADER ====== */
  header {
    background: var(--green);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  header .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  header .logo span { color: #7dcea0; }
  header .tagline { font-size: 11px; opacity: 0.75; margin-top: 1px; }

  /* ====== NAV ====== */
  nav {
    background: white;
    border-bottom: 2px solid var(--green-border);
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
  }
  nav button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 13px 18px;
    border: none;
    background: none;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }
  nav button.active {
    color: var(--green);
    border-bottom-color: var(--green);
  }
  nav button:hover { color: var(--green); }
  nav button .icon { font-size: 16px; }

  /* ====== MAIN ====== */
  main { max-width: 900px; margin: 0 auto; padding: 20px 16px 80px; }

  .section { display: none; }
  .section.active { display: block; }

  /* ====== CARDS ====== */
  .card {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* ====== BUTTONS ====== */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 11px 20px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover { background: var(--green-light); }
  .btn-danger { background: #e74c3c; color: white; }
  .btn-danger:hover { background: #c0392b; }
  .btn-outline { background: white; color: var(--green); border: 2px solid var(--green); }
  .btn-outline:hover { background: var(--green-pale); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #c94f1e; }
  .btn-sm { padding: 7px 14px; font-size: 12px; }
  .btn-full { width: 100%; justify-content: center; }

  /* ====== FORMS ====== */
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input, select, textarea {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    background: white;
    color: var(--text);
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(26,92,58,0.1);
  }
  textarea { min-height: 80px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* ====== TABLES ====== */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th {
    background: var(--green);
    color: white;
    padding: 10px 12px;
    text-align: left;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--green-pale); }
  .tfoot td {
    font-weight: 700;
    background: #f0f8f4;
    border-top: 2px solid var(--green-border);
  }

  /* ====== DASHBOARD ====== */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .date-btn {
    padding: 8px 16px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .date-btn.active { background: var(--green); color: white; border-color: var(--green); }
  .date-btn:hover { border-color: var(--green); color: var(--green); }
  input[type="date"].date-input {
    width: auto;
    padding: 7px 12px;
    font-size: 13px;
  }

  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card {
    background: white;
    border-radius: var(--radius);
    padding: 18px 16px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }
  .stat-card .num { font-size: 36px; font-weight: 800; color: var(--green); line-height: 1; }
  .stat-card .unit { font-size: 13px; color: var(--text-sub); margin-top: 4px; }
  .stat-card.accent .num { color: var(--accent); }

  /* ====== TAGS ====== */
  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
  }
  .tag-green { background: var(--green-pale); color: var(--green); }
  .tag-orange { background: #fef3e8; color: #e8622a; }

  /* ====== ALERTS ====== */
  .alert {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
  }
  .alert-info { background: var(--green-pale); color: var(--green); border: 1px solid var(--green-border); }

  /* ====== MODAL ====== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    color: var(--green);
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; justify-content: center; }

  /* ====== EMPTY STATE ====== */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-sub);
  }
  .empty .icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ====== SECTION HEADER ====== */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .section-header h2 { font-size: 20px; font-weight: 800; }

  /* ====== PRINT STYLES ====== */
  @media print {
    header, nav, .no-print, .btn { display: none !important; }
    body { background: white; font-size: 12px; }
    .print-section { display: block !important; }
    .card { box-shadow: none; border: 1px solid #ccc; margin-bottom: 12px; }
    th { background: #333 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .print-title { font-size: 20px; font-weight: bold; margin-bottom: 16px; }
  }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .stat-card .num { font-size: 28px; }
    .form-row { grid-template-columns: 1fr; }
    .form-row-3 { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Camp<span>Meal</span> Manager</div>
    <div class="tagline">合宿食数・弁当発注・請求管理システム</div>
  </div>
</header>

<nav>
  <button class="active" onclick="showTab('dashboard')"><span class="icon">📊</span>ダッシュボード</button>
  <button onclick="showTab('teams')"><span class="icon">⚽</span>チーム管理</button>
  <button onclick="showTab('meals')"><span class="icon">🍱</span>食数管理</button>
  <button onclick="showTab('bento')"><span class="icon">📦</span>弁当管理</button>
  <button onclick="showTab('bento-order')"><span class="icon">🖨️</span>弁当発注書</button>
  <button onclick="showTab('kitchen')"><span class="icon">👨‍🍳</span>厨房用食数表</button>
  <button onclick="showTab('billing')"><span class="icon">💴</span>請求管理</button>
</nav>

<main>

  <!-- ====== DASHBOARD ====== -->
  <div id="dashboard" class="section active">
    <div class="section-header">
      <h2>📊 ダッシュボード</h2>
    </div>

    <div class="date-nav">
      <button class="date-btn active" onclick="setDateQuick('today', this)">今日</button>
      <button class="date-btn" onclick="setDateQuick('tomorrow', this)">明日</button>
      <input type="date" id="dashDate" class="date-input" onchange="renderDashboard()">
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="num" id="stat-stay">0</div>
        <div class="unit">宿泊人数</div>
      </div>
      <div class="stat-card">
        <div class="num" id="stat-breakfast">0</div>
        <div class="unit">朝食</div>
      </div>
      <div class="stat-card accent">
        <div class="num" id="stat-dinner">0</div>
        <div class="unit">夕食</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">チーム別内訳</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>チーム名</th><th>選手</th><th>スタッフ</th><th>朝食</th><th>夕食</th></tr>
          </thead>
          <tbody id="dash-table-body"></tbody>
          <tfoot><tr class="tfoot" id="dash-table-foot"></tr></tfoot>
        </table>
      </div>
    </div>
  </div>

  <!-- ====== TEAMS ====== -->
  <div id="teams" class="section">
    <div class="section-header">
      <h2>⚽ チーム管理</h2>
      <button class="btn btn-primary" onclick="openTeamModal()">＋ チーム追加</button>
    </div>
    <div id="team-list"></div>
  </div>

  <!-- ====== MEALS ====== -->
  <div id="meals" class="section">
    <div class="section-header">
      <h2>🍱 食数管理</h2>
      <button class="btn btn-primary" onclick="openMealModal()">＋ 食数入力</button>
    </div>
    <div class="date-nav">
      <label style="font-size:13px;font-weight:700;color:var(--text-sub);">表示日：</label>
      <input type="date" id="mealsDate" class="date-input" onchange="renderMeals()">
    </div>
    <div id="meal-list"></div>
  </div>

  <!-- ====== BENTO ====== -->
  <div id="bento" class="section">
    <div class="section-header">
      <h2>📦 弁当管理</h2>
      <button class="btn btn-primary" onclick="openBentoModal()">＋ 弁当登録</button>
    </div>
    <div class="date-nav">
      <label style="font-size:13px;font-weight:700;color:var(--text-sub);">表示日：</label>
      <input type="date" id="bentoDate" class="date-input" onchange="renderBento()">
    </div>
    <div id="bento-list"></div>
  </div>

  <!-- ====== BENTO ORDER PRINT ====== -->
  <div id="bento-order" class="section">
    <div class="section-header">
      <h2>🖨️ 弁当発注書</h2>
      <button class="btn btn-accent" onclick="window.print()">🖨️ 印刷</button>
    </div>
    <div class="date-nav">
      <label style="font-size:13px;font-weight:700;color:var(--text-sub);">日付：</label>
      <input type="date" id="bentoOrderDate" class="date-input" onchange="renderBentoOrder()">
    </div>
    <div id="bento-order-content"></div>
  </div>

  <!-- ====== KITCHEN PRINT ====== -->
  <div id="kitchen" class="section">
    <div class="section-header">
      <h2>👨‍🍳 厨房用食数表</h2>
      <button class="btn btn-accent" onclick="window.print()">🖨️ 印刷</button>
    </div>
    <div class="date-nav">
      <label style="font-size:13px;font-weight:700;color:var(--text-sub);">日付：</label>
      <input type="date" id="kitchenDate" class="date-input" onchange="renderKitchen()">
    </div>
    <div id="kitchen-content"></div>
  </div>

  <!-- ====== BILLING ====== -->
  <div id="billing" class="section">
    <div class="section-header">
      <h2>💴 請求管理</h2>
    </div>
    <div id="billing-list"></div>
  </div>

</main>

<!-- ====== TEAM MODAL ====== -->
<div class="modal-overlay" id="teamModal">
  <div class="modal">
    <div class="modal-title" id="teamModalTitle">チーム追加</div>
    <input type="hidden" id="teamEditId">
    <div class="form-group">
      <label>チーム名 *</label>
      <input type="text" id="teamName" placeholder="例：FC白州">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>担当者名</label>
        <input type="text" id="teamContact" placeholder="山田 太郎">
      </div>
      <div class="form-group">
        <label>電話番号</label>
        <input type="tel" id="teamPhone" placeholder="090-0000-0000">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>宿泊開始日 *</label>
        <input type="date" id="teamStart">
      </div>
      <div class="form-group">
        <label>宿泊終了日 *</label>
        <input type="date" id="teamEnd">
      </div>
    </div>
    <div class="form-group">
      <label>メモ</label>
      <textarea id="teamMemo" placeholder="アレルギー・要望など"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('teamModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveTeam()">保存</button>
    </div>
  </div>
</div>

<!-- ====== MEAL MODAL ====== -->
<div class="modal-overlay" id="mealModal">
  <div class="modal">
    <div class="modal-title" id="mealModalTitle">食数入力</div>
    <input type="hidden" id="mealEditId">
    <div class="form-row">
      <div class="form-group">
        <label>チーム *</label>
        <select id="mealTeam"></select>
      </div>
      <div class="form-group">
        <label>日付 *</label>
        <input type="date" id="mealDate">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>選手人数</label>
        <input type="number" id="mealPlayers" min="0" value="0">
      </div>
      <div class="form-group">
        <label>スタッフ人数</label>
        <input type="number" id="mealStaff" min="0" value="0">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>朝食数</label>
        <input type="number" id="mealBreakfast" min="0" value="0">
      </div>
      <div class="form-group">
        <label>夕食数</label>
        <input type="number" id="mealDinner" min="0" value="0">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('mealModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveMeal()">保存</button>
    </div>
  </div>
</div>

<!-- ====== BENTO MODAL ====== -->
<div class="modal-overlay" id="bentoModal">
  <div class="modal">
    <div class="modal-title" id="bentoModalTitle">弁当登録</div>
    <input type="hidden" id="bentoEditId">
    <div class="form-row">
      <div class="form-group">
        <label>チーム名 *</label>
        <select id="bentoTeam"></select>
      </div>
      <div class="form-group">
        <label>日付 *</label>
        <input type="date" id="bentoDateInput">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>配達時間</label>
        <input type="time" id="bentoTime" value="10:00">
      </div>
      <div class="form-group">
        <label>お茶</label>
        <select id="bentoTea">
          <option value="あり">あり</option>
          <option value="なし">なし</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>配達場所</label>
      <input type="text" id="bentoPlace" placeholder="例：白州総合グラウンド">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>弁当単価（円）</label>
        <input type="number" id="bentoPrice" min="0" value="700">
      </div>
      <div class="form-group">
        <label>数量</label>
        <input type="number" id="bentoQty" min="1" value="1">
      </div>
    </div>
    <div class="form-group">
      <label>備考</label>
      <input type="text" id="bentoBiko" placeholder="特記事項など">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('bentoModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveBento()">保存</button>
    </div>
  </div>
</div>

<!-- ====== BILLING MODAL ====== -->
<div class="modal-overlay" id="billingModal">
  <div class="modal">
    <div class="modal-title">請求編集</div>
    <input type="hidden" id="billingTeamId">
    <div class="form-group">
      <label>宿泊費（手入力）</label>
      <input type="number" id="billingStay" min="0" value="0">
    </div>
    <div class="alert alert-info" style="font-size:13px;margin:8px 0;">
      または 人数 × 単価で計算：
      <div style="display:flex;gap:8px;margin-top:8px;">
        <input type="number" id="billingHeads" min="0" placeholder="人数" style="flex:1;">
        <span style="line-height:42px;">×</span>
        <input type="number" id="billingRate" min="0" placeholder="単価（円）" style="flex:1;">
        <button class="btn btn-outline btn-sm" onclick="calcStay()">計算</button>
      </div>
    </div>
    <div class="form-group">
      <label>その他費用（円）</label>
      <input type="number" id="billingOther" min="0" value="0">
    </div>
    <div class="form-group">
      <label>その他備考</label>
      <input type="text" id="billingOtherNote" placeholder="施設使用料など">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('billingModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveBilling()">保存</button>
    </div>
  </div>
</div>

<!-- ====== INVOICE MODAL ====== -->
<div class="modal-overlay" id="invoiceModal">
  <div class="modal" style="border-radius:12px;">
    <div id="invoice-content"></div>
    <div class="modal-actions no-print">
      <button class="btn btn-outline" onclick="closeModal('invoiceModal')">閉じる</button>
      <button class="btn btn-accent" onclick="window.print()">🖨️ 印刷</button>
    </div>
  </div>
</div>

<script>
// ====================================================
//  DATA LAYER
// ====================================================

const DB_KEY_TEAMS   = 'cmm_teams';
const DB_KEY_MEALS   = 'cmm_meals';
const DB_KEY_BENTO   = 'cmm_bento';
const DB_KEY_BILLING = 'cmm_billing';

function load(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; }
  catch(e) { return []; }
}
function save(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// ====================================================
//  SAMPLE DATA
// ====================================================

function initSampleData() {
  if (load(DB_KEY_TEAMS).length > 0) return;

  const today = todayStr();
  const d = (offset) => {
    const d = new Date(); d.setDate(d.getDate() + offset);
    return d.toISOString().slice(0,10);
  };

function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return `${d.getMonth()+1}月${d.getDate()}日`;
}
function fmtYMD(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}
function getTeamName(id) {
  const t = load(DB_KEY_TEAMS).find(t => t.id === id);
  return t ? t.name : '不明';
}
function numFmt(n) { return Number(n||0).toLocaleString(); }

// ====================================================
//  NAVIGATION
// ====================================================

function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  const btns = document.querySelectorAll('nav button');
  const labels = ['dashboard','teams','meals','bento','bento-order','kitchen','billing'];
  const idx = labels.indexOf(name);
  if (idx >= 0) btns[idx].classList.add('active');

  if (name === 'dashboard')    renderDashboard();
  if (name === 'teams')        renderTeams();
  if (name === 'meals')        renderMeals();
  if (name === 'bento')        renderBento();
  if (name === 'bento-order')  renderBentoOrder();
  if (name === 'kitchen')      renderKitchen();
  if (name === 'billing')      renderBilling();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

//  DASHBOARD
// ====================================================

function setDateQuick(type, el) {
  document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const d = new Date();
  if (type === 'tomorrow') d.setDate(d.getDate() + 1);
  document.getElementById('dashDate').value = d.toISOString().slice(0,10);
  renderDashboard();
}

function renderDashboard() {
  const date = document.getElementById('dashDate').value || todayStr();
  document.getElementById('dashDate').value = date;
  const teams = load(DB_KEY_TEAMS);
  const meals  = load(DB_KEY_MEALS).filter(m => m.date === date);

  let totalPlayers=0, totalStaff=0, totalBreakfast=0, totalDinner=0;
  const rows = meals.map(m => {
    const p = Number(m.players||0), s = Number(m.staff||0);
    const b = Number(m.breakfast||0), d = Number(m.dinner||0);
    totalPlayers += p; totalStaff += s; totalBreakfast += b; totalDinner += d;
    return `<tr>
      <td><strong>${getTeamName(m.teamId)}</strong></td>
      <td>${p}</td><td>${s}</td>
      <td>${b}</td><td>${d}</td>
    </tr>`;
  });

  document.getElementById('stat-stay').textContent      = totalPlayers + totalStaff;
  document.getElementById('stat-breakfast').textContent = totalBreakfast;
  document.getElementById('stat-dinner').textContent    = totalDinner;

  const tbody = document.getElementById('dash-table-body');
  const tfoot = document.getElementById('dash-table-foot');

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#999;padding:20px;">${fmtDate(date)} のデータがありません</td></tr>`;
    tfoot.innerHTML = '';
  } else {
    tbody.innerHTML = rows.join('');
    tfoot.innerHTML = `<td>合計</td><td>${totalPlayers}</td><td>${totalStaff}</td><td>${totalBreakfast}</td><td>${totalDinner}</td>`;
  }
}

    document.getElementById('teamStart').value   = t.start;

function editTeam(id) { openTeamModal(id); }

function saveTeam() {
  const name = document.getElementById('teamName').value.trim();
  if (!name) { alert('チーム名を入力してください'); return; }
  const id = document.getElementById('teamEditId').value;
  const teams = load(DB_KEY_TEAMS);
  const data = {
    id: id || uid(),
    name,
    contact: document.getElementById('teamContact').value.trim(),
    phone:   document.getElementById('teamPhone').value.trim(),
    start:   document.getElementById('teamStart').value,
    end:     document.getElementById('teamEnd').value,
    memo:    document.getElementById('teamMemo').value.trim(),
  };
  if (id) {
    const idx = teams.findIndex(t => t.id === id);
    if (idx >= 0) teams[idx] = data;
  } else {
    teams.push(data);
    // 請求レコード追加
    const billing = load(DB_KEY_BILLING);
    if (!billing.find(b => b.teamId === data.id)) {
      billing.push({ teamId: data.id, stay: 0, other: 0, otherNote: '' });
      save(DB_KEY_BILLING, billing);
    }
  }
  save(DB_KEY_TEAMS, teams);
  closeModal('teamModal');
  renderTeams();
}

function deleteTeam(id) {
  if (!confirm('このチームを削除しますか？\n関連する食数・弁当データは残ります。')) return;
  save(DB_KEY_TEAMS, load(DB_KEY_TEAMS).filter(t => t.id !== id));
  renderTeams();
}

function renderBentoOrder() {
  const date = document.getElementById('bentoOrderDate').value || todayStr();
  document.getElementById('bentoOrderDate').value = date;
  const items = load(DB_KEY_BENTO)
    .filter(b => b.date === date)
    .sort((a,b) => a.time.localeCompare(b.time));
  const el = document.getElementById('bento-order-content');

  if (items.length === 0) {
    el.innerHTML = `<div class="card"><div class="empty"><div class="icon">📦</div><p>${fmtDate(date)} の弁当データがありません</p></div></div>`;
    return;
  }

  // 集計
  const summary = {};
  let total = 0;
  items.forEach(b => {
    const key = `${numFmt(b.price)}円弁当`;
    summary[key] = (summary[key] || 0) + b.qty;
    total += b.qty;
  });

  const rows = items.map(b => `<tr>
    <td>${b.time}</td>
    <td>${b.place}</td>
    <td>${getTeamName(b.teamId)}</td>
    <td>${numFmt(b.price)}円</td>
    <td style="text-align:right;font-weight:700;">${b.qty}</td>
    <td>${b.tea}</td>
    ${b.note ? `<td style="font-size:12px;">${b.note}</td>` : '<td></td>'}
  </tr>`).join('');

  const sumRows = Object.entries(summary).map(([k,v]) => `<tr><td colspan="3">${k}</td><td colspan="2" style="text-align:right;font-weight:700;">${v}個</td><td colspan="2"></td></tr>`).join('');

  el.innerHTML = `
    <div class="card">
      <div class="print-title" style="font-size:18px;font-weight:800;margin-bottom:12px;">
        弁当発注書　${fmtYMD(date)}
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>時間</th><th>場所</th><th>チーム</th><th>弁当単価</th><th>数量</th><th>お茶</th><th>備考</th>
          </tr></thead>
          <tbody>${rows}</tbody>
          <tfoot>
            ${sumRows}
            <tr class="tfoot"><td colspan="4" style="font-size:15px;">📦 総数</td><td style="text-align:right;font-size:18px;font-weight:800;">${total}個</td><td colspan="2"></td></tr>
          </tfoot>
        </table>
      </div>
    </div>
  `;
}

  }

  el.innerHTML = teams.map(t => {
    const b = billing.find(b => b.teamId === t.id) || { stay: 0, other: 0, otherNote: '' };
    const bentoList = bento.filter(bn => bn.teamId === t.id);
    const bentoTotal = bentoList.reduce((sum, bn) => sum + bn.price * bn.qty, 0);
    const stayAmt = Number(b.stay || 0);
    const otherAmt = Number(b.other || 0);
    const grandTotal = stayAmt + bentoTotal + otherAmt;

    // 弁当内訳
    const bentoBreakdown = {};
    bentoList.forEach(bn => {
      const key = `${numFmt(bn.price)}円`;
      bentoBreakdown[key] = (bentoBreakdown[key] || {qty:0, amt:0});
      bentoBreakdown[key].qty += bn.qty;
      bentoBreakdown[key].amt += bn.price * bn.qty;
    });
    const bentoRows = Object.entries(bentoBreakdown).map(([k,v]) =>
      `<div style="font-size:12px;color:var(--text-sub);">└ 弁当 ${k} × ${v.qty}個 = ${numFmt(v.amt)}円</div>`
    ).join('');

    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
        <div style="flex:1;min-width:200px;">
          <div style="font-size:18px;font-weight:800;margin-bottom:10px;">${t.name}</div>
          <div style="font-size:14px;margin-bottom:4px;">🏨 宿泊費：${numFmt(stayAmt)}円</div>
          <div style="font-size:14px;margin-bottom:2px;">🍱 弁当代：${numFmt(bentoTotal)}円</div>
          ${bentoRows}
          ${otherAmt > 0 ? `<div style="font-size:14px;margin-top:4px;">📌 その他：${numFmt(otherAmt)}円${b.otherNote ? `（${b.otherNote}）` : ''}</div>` : ''}
          <div style="margin-top:12px;padding-top:10px;border-top:2px solid var(--green-border);font-size:20px;font-weight:800;color:var(--green);">
            合計：${numFmt(grandTotal)}円
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button class="btn btn-outline btn-sm" onclick="openBillingModal('${t.id}')">✏️ 宿泊費・その他編集</button>
          <button class="btn btn-accent btn-sm" onclick="showInvoice('${t.id}')">🖨️ 請求書印刷</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openBillingModal(teamId) {
  document.getElementById('billingTeamId').value = teamId;
  const billing = load(DB_KEY_BILLING);
  const b = billing.find(b => b.teamId === teamId) || { stay: 0, other: 0, otherNote: '' };
  document.getElementById('billingStay').value      = b.stay || 0;
  document.getElementById('billingHeads').value     = '';
  document.getElementById('billingRate').value      = '';
  document.getElementById('billingOther').value     = b.other || 0;
  document.getElementById('billingOtherNote').value = b.otherNote || '';
  openModal('billingModal');
}

function calcStay() {
  const h = Number(document.getElementById('billingHeads').value || 0);
  const r = Number(document.getElementById('billingRate').value || 0);
  document.getElementById('billingStay').value = h * r;
}

function saveBilling() {
  const teamId = document.getElementById('billingTeamId').value;
  const billing = load(DB_KEY_BILLING);
  const idx = billing.findIndex(b => b.teamId === teamId);
  const data = {
    teamId,
    stay:      Number(document.getElementById('billingStay').value || 0),
    other:     Number(document.getElementById('billingOther').value || 0),
    otherNote: document.getElementById('billingOtherNote').value.trim(),
  };
  if (idx >= 0) billing[idx] = data;
  else billing.push(data);
  save(DB_KEY_BILLING, billing);
  closeModal('billingModal');
  renderBilling();
}

function showInvoice(teamId) {
  const t = load(DB_KEY_TEAMS).find(t => t.id === teamId);
  if (!t) return;
  const b = (load(DB_KEY_BILLING).find(b => b.teamId === teamId)) || { stay: 0, other: 0, otherNote: '' };
  const bentoList = load(DB_KEY_BENTO).filter(bn => bn.teamId === teamId);
  const bentoTotal = bentoList.reduce((sum, bn) => sum + bn.price * bn.qty, 0);
  const stayAmt = Number(b.stay || 0);
  const otherAmt = Number(b.other || 0);
  const grandTotal = stayAmt + bentoTotal + otherAmt;

  const bentoBreakdown = {};
  bentoList.forEach(bn => {
    const key = `${numFmt(bn.price)}円弁当`;
    bentoBreakdown[key] = (bentoBreakdown[key] || {qty:0, amt:0});
    bentoBreakdown[key].qty += bn.qty;
    bentoBreakdown[key].amt += bn.price * bn.qty;
  });

  const bentoRows = Object.entries(bentoBreakdown).map(([k,v]) =>
    `<tr><td style="padding-left:24px;font-size:13px;color:#555;">└ ${k} × ${v.qty}個</td><td style="text-align:right;">${numFmt(v.amt)}円</td></tr>`
  ).join('');

  document.getElementById('invoice-content').innerHTML = `
    <div style="font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:14px;line-height:1.8;">
      <div style="text-align:center;font-size:22px;font-weight:800;margin-bottom:4px;">請　求　書</div>
      <div style="text-align:center;font-size:13px;color:#555;margin-bottom:20px;">発行日：${fmtYMD(todayStr())}</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:4px;">${t.name} 御中</div>
      <div style="font-size:13px;color:#555;">担当：${t.contact || '—'}　　宿泊期間：${fmtYMD(t.start)} 〜 ${fmtYMD(t.end)}</div>
      <hr style="margin:16px 0;border-color:#ccc;">
      <table style="width:100%;border-collapse:collapse;font-size:14px;">
        <tr style="background:#f0f8f4;"><th style="text-align:left;padding:8px;">項目</th><th style="text-align:right;padding:8px;">金額</th></tr>
        <tr><td style="padding:8px;border-bottom:1px solid #eee;">宿泊費</td><td style="text-align:right;padding:8px;border-bottom:1px solid #eee;">${numFmt(stayAmt)}円</td></tr>
        <tr><td style="padding:8px;border-bottom:1px solid #eee;">弁当代（合計）</td><td style="text-align:right;padding:8px;border-bottom:1px solid #eee;">${numFmt(bentoTotal)}円</td></tr>
        ${bentoRows}
        ${otherAmt > 0 ? `<tr><td style="padding:8px;border-bottom:1px solid #eee;">その他${b.otherNote ? `（${b.otherNote}）` : ''}</td><td style="text-align:right;padding:8px;border-bottom:1px solid #eee;">${numFmt(otherAmt)}円</td></tr>` : ''}
        <tr style="background:#1a5c3a;color:white;"><td style="padding:10px;font-weight:700;font-size:16px;">合　計</td><td style="text-align:right;padding:10px;font-weight:800;font-size:20px;">${numFmt(grandTotal)}円</td></tr>
      </table>
      <div style="margin-top:20px;font-size:12px;color:#888;text-align:right;">※ お支払い期限は宿泊終了日より14日以内でお願いいたします。</div>
    </div>
  `;
  openModal('invoiceModal');
}

initSampleData();
document.getElementById('dashDate').value    = todayStr();
document.getElementById('mealsDate').value   = todayStr();
document.getElementById('bentoDate').value   = todayStr();
document.getElementById('bentoOrderDate').value = todayStr();
document.getElementById('kitchenDate').value = todayStr();
renderDashboard();
</script>
